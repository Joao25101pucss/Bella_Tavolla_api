version: '3.8'

services:
  api:
    build: .
    container_name: bella_tavola_api
    env_file:
      - .env # Puxa o ficheiro de configuração (Bloco 10)
    environment:
      - HF_TOKEN=${HF_TOKEN} # Permite injetar o token no terminal sem comitar no código
    volumes:
      - api_data:/app/data # Named volume para garantir a persistência de dados (Bloco 10)
    expose:
      - "8000" # Apenas expõe internamente para o Nginx, fechando acessos diretos externos

  nginx:
    image: nginx:alpine
    container_name: bella_tavola_nginx
    ports:
      - "80:80" # Mapeia a porta 80 do teu computador para a 80 do Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Bind mount apenas para o ficheiro de configuração
    depends_on:
      - api # Garante que o Nginx só sobe depois da API

volumes:
  # Declaração do Named Volume
  api_data: